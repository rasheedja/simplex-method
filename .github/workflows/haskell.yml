name: Haskell CI

on:
  push:
    branches:
      - "*"
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  fourmolu:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: haskell-actions/run-fourmolu@v9
        with:
          version: "0.14.0.0"
  build:
    name: GHC ${{ matrix.ghc-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        ghc-version: ["9.12", "9.10", "9.8", "9.6", "9.4", "9.2", "9.0"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up GHC ${{ matrix.ghc-version }}
        uses: haskell/actions/setup@v2
        id: setup
        with:
          ghc-version: ${{ matrix.ghc-version }}
          enable-stack: true

      - name: Installed minor versions of GHC, Cabal, and Stack
        shell: bash
        run: |
          GHC_VERSION=$(ghc --numeric-version)
          CABAL_VERSION=$(cabal --numeric-version)
          STACK_VERSION=$(stack --numeric-version)
          echo "GHC_VERSION=${GHC_VERSION}"     >> "${GITHUB_ENV}"
          echo "CABAL_VERSION=${CABAL_VERSION}" >> "${GITHUB_ENV}"
          echo "STACK_VERSION=${STACK_VERSION}" >> "${GITHUB_ENV}"

      - name: Configure the build
        run: |
          cabal update
          cabal configure --enable-tests --enable-benchmarks --disable-documentation
          cabal build --dry-run
          # stack build --test --bench --no-haddock --dry-run
        # The last step generates dist-newstyle/cache/plan.json for the cache key.

      - name: Build dependencies
        run: cabal build --only-dependencies

      - name: Build the package
        run: cabal build

      - name: Run tests
        run: cabal test

      - name: Check cabal file
        run: cabal check

      - name: Build documentation
        run: cabal haddock
